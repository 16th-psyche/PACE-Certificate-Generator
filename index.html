<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACE Certificate Generator</title>

  <!-- CDN Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:        #ffc938;
      --accent-hover:  #e6b200;
      --accent-light:  rgba(255,201,56,0.1);
      --surface:       #FFFFFF;
      --surface-2:     #F2F2F7;
      --border:        rgba(60,60,67,.12);
      --text-1:        #1C1C1E;
      --text-2:        #3C3C43;
      --text-3:        rgba(60,60,67,.45);
      --success:       #34C759;
      --success-hover: #2DB04E;
      --danger:        #FF3B30;
      --radius:        14px;
      --radius-sm:     10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--surface-2);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow:
        0 2px 6px rgba(0,0,0,0.06),
        0 8px 32px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-img {
      height: 52px;
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: rgba(118,118,128,0.05);
      position: relative;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upload-zone.ready {
      border-style: solid;
      border-color: var(--success);
      background: rgba(52,199,89,0.05);
    }

    .upload-icon { font-size: 26px; display: block; margin-bottom: 6px; }

    .upload-main {
      font-size: 15px;
      font-weight: 500;
    }

    .upload-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 3px;
    }

    .file-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 980px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, background 0.15s;
      text-align: center;
    }

    #generateBtn {
      background: var(--accent);
      color: var(--text-1);
    }

    #generateBtn:hover:not(:disabled) { background: var(--accent-hover); }
    #generateBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    #downloadBtn {
      background: var(--success);
      color: #fff;
      margin-top: 12px;
      display: none;
    }

    #downloadBtn:hover { background: var(--success-hover); }

    .progress-wrap { display: none; margin-top: 20px; }

    .bar-track {
      height: 5px;
      background: rgba(118,118,128,0.15);
      border-radius: 980px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 980px;
      transition: width 0.25s ease;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-3);
      text-align: center;
    }

    .toast {
      font-size: 14px;
      padding: 11px 15px;
      border-radius: var(--radius-sm);
      margin-top: 16px;
      display: none;
      line-height: 1.4;
    }
    .toast.error   { background: rgba(255,59,48,0.1);  color: var(--danger); }
    .toast.success { background: rgba(52,199,89,0.1);  color: #1A7F37; }
    .toast.info    { background: rgba(0,122,255,0.1);  color: #0055C8; }
  </style>
</head>

  // ── Constants ─────────────────────────────────────────────────────────────
  const SVG_W    = 841.9;
  const SVG_H    = 595.3;
  const NAME_X   = SVG_W / 2;   // 420.95 — horizontal center
  const NAME_Y   = 291.8;        // original baseline Y
  const SCALE    = 2;            // render scale (~144 DPI at A4)

  // ── State ─────────────────────────────────────────────────────────────────
  let names   = null;
  let zipBlob = null;

  // ── UI refs ───────────────────────────────────────────────────────────────
  const csvInput      = document.getElementById('csvInput');
  const generateBtn   = document.getElementById('generateBtn');
  const downloadBtn   = document.getElementById('downloadBtn');
  const progressWrap  = document.getElementById('progressWrap');
  const barFill       = document.getElementById('barFill');
  const progressLabel = document.getElementById('progressLabel');
  const toast         = document.getElementById('toast');

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
  }

  function setProgress(done, total) {
    barFill.style.width = `${Math.round((done / total) * 100)}%`;
    progressLabel.textContent = `Generating certificate ${done} of ${total}\u2026`;
  }

  function sanitizeFilename(name) {
    return name.replace(/[<>:"/\\|?*\x00-\x1F]/g, '').trim();
  }

  // ── CSV upload ────────────────────────────────────────────────────────────
  csvInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: results => {
        const parsed = results.data
          .map(row => row['Name'] ?? row['name'] ?? '')
          .map(s => s.trim())
          .filter(Boolean);

        if (parsed.length === 0) {
          showToast('No names found. Make sure the CSV has a "Name" column.', 'error');
          names = null;
          document.getElementById('csvZone').classList.remove('ready');
        } else {
          names = parsed;
          document.getElementById('csvLabel').textContent =
            `${file.name}  \u2022  ${parsed.length} name${parsed.length !== 1 ? 's' : ''}`;
          document.getElementById('csvZone').classList.add('ready');
          showToast(`Found ${parsed.length} name${parsed.length !== 1 ? 's' : ''} ready to process.`, 'success');
        }
        generateBtn.disabled = !names;
      },
      error: () => {
        showToast('Could not parse the CSV file.', 'error');
        names = null;
        generateBtn.disabled = true;
      }
    });
  });

  // Drag-and-drop
  const csvZone = document.getElementById('csvZone');
  csvZone.addEventListener('dragover',  e => { e.preventDefault(); csvZone.classList.add('drag-over'); });
  csvZone.addEventListener('dragleave', () => csvZone.classList.remove('drag-over'));
  csvZone.addEventListener('drop', e => {
    e.preventDefault();
    csvZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      const dt = new DataTransfer();
      dt.items.add(e.dataTransfer.files[0]);
      csvInput.files = dt.files;
      csvInput.dispatchEvent(new Event('change'));
    }
  });

  // ── Build modified SVG ────────────────────────────────────────────────────
  function buildCertificateSvg(name) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(SVG_TEMPLATE, 'image/svg+xml');

    if (doc.querySelector('parsererror')) throw new Error('SVG template parse error.');

    // Set explicit dimensions so canvas drawImage renders at the right size
    const svgEl = doc.documentElement;
    svgEl.setAttribute('width',  String(SVG_W));
    svgEl.setAttribute('height', String(SVG_H));

    const nameEl = doc.getElementById('name');
    if (!nameEl) throw new Error('<text id="name"> not found in SVG.');

    const tspan = nameEl.querySelector('tspan');
    if (!tspan)  throw new Error('<tspan> not found inside name element.');

    // Inject name and center it horizontally
    tspan.textContent = name;
    nameEl.setAttribute('transform', `translate(${NAME_X} ${NAME_Y})`);
    nameEl.setAttribute('text-anchor', 'middle');
    tspan.setAttribute('x', '0');

    return new XMLSerializer().serializeToString(doc);
  }

  // ── SVG string → canvas ───────────────────────────────────────────────────
  function renderSvgToCanvas(svgString) {
    const W = Math.round(SVG_W * SCALE);
    const H = Math.round(SVG_H * SCALE);

    return new Promise((resolve, reject) => {
      const canvas = document.createElement('canvas');
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url  = URL.createObjectURL(blob);

      const img = new Image(W, H);
      img.onload = () => { ctx.drawImage(img, 0, 0, W, H); URL.revokeObjectURL(url); resolve(canvas); };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to render SVG.' )); };
      img.src = url;
    });
  }

  // ── canvas → PDF blob ─────────────────────────────────────────────────────
  function canvasToPdfBlob(canvas) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 841.89, 595.28);
    return pdf.output('blob');
  }

  // ── Generate ──────────────────────────────────────────────────────────────
  generateBtn.addEventListener('click', async () => {
    generateBtn.disabled = true;
    downloadBtn.style.display = 'none';
    progressWrap.style.display = 'block';
    toast.style.display = 'none';
    zipBlob = null;

    const zip = new JSZip();

    try {
      for (let i = 0; i < names.length; i++) {
        const name     = names[i];
        const serial   = String(i + 1).padStart(3, '0');
        const filename = `${serial}_${sanitizeFilename(name)}.pdf`;

        setProgress(i + 1, names.length);
        await new Promise(r => setTimeout(r, 10)); // let the UI repaint

        const svgStr = buildCertificateSvg(name);
        const canvas = await renderSvgToCanvas(svgStr);
        const pdf    = canvasToPdfBlob(canvas);

        zip.file(filename, pdf);
      }

      progressLabel.textContent = 'Packaging ZIP\u2026';
      await new Promise(r => setTimeout(r, 10));

      zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });

      barFill.style.width = '100%';
      progressLabel.textContent =
        `Done! ${names.length} certificate${names.length !== 1 ? 's' : ''} ready.`;
      downloadBtn.style.display = 'block';
      showToast(`${names.length} certificate${names.length !== 1 ? 's' : ''} generated successfully.`, 'success');

    } catch (err) {
      showToast(`Error: ${err.message}`, 'error');
      console.error(err);
      progressWrap.style.display = 'none';
    }

    generateBtn.disabled = false;
  });

  // ── Download ──────────────────────────────────────────────────────────────
  downloadBtn.addEventListener('click', () => {
    if (zipBlob) saveAs(zipBlob, 'PACE_Certificates.zip');
  });
</script>
</body>
